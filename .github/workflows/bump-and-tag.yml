name: Bump and Tag

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: >-
      github.event.pull_request.merged == true &&
      (contains(github.event.pull_request.title, '[patch]') ||
       contains(github.event.pull_request.title, '[minor]') ||
       contains(github.event.pull_request.title, '[major]'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BUMP_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poetry
        run: pip install poetry

      - name: Determine bump type
        id: bump
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qF '[major]'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$TITLE" | grep -qF '[minor]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        run: poetry version ${{ steps.bump.outputs.type }}

      - name: Read new version
        id: version
        run: echo "value=$(poetry version --short)" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.value }} [skip ci]"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.BUMP_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            --title "v${{ steps.version.outputs.value }}" \
            --generate-notes
